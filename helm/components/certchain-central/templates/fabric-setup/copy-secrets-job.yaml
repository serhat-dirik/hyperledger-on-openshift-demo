# Copy org secrets to central namespace — retry loop handles cross-app timing
apiVersion: batch/v1
kind: Job
metadata:
  name: copy-org-secrets
  labels:
    {{- include "certchain-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: fabric-setup
      restartPolicy: Never
      containers:
        - name: copy-secrets
          image: registry.access.redhat.com/ubi9/ubi:latest
          command: ["/bin/bash", "/scripts/copy-org-secrets.sh"]
          env:
            - name: CENTRAL_NS
              value: {{ .Release.Namespace }}
            - name: MAX_RETRIES
              value: "60"
            - name: RETRY_INTERVAL
              value: "10"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: fabric-setup-scripts
            defaultMode: 0755
