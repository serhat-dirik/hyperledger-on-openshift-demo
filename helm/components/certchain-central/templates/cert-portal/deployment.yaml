# CertChain Portal — Central certification verification portal (PWA)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-portal
  labels:
    app: cert-portal
    app.kubernetes.io/name: cert-portal
    {{- include "certchain-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
    app.openshift.io/runtime: nodejs
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    app.openshift.io/connects-to: '["verify-api"]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cert-portal
  template:
    metadata:
      labels:
        app: cert-portal
        app.kubernetes.io/name: cert-portal
        {{- include "certchain-central.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
        app.openshift.io/runtime: nodejs
    spec:
      containers:
        - name: cert-portal
          image: "{{ .Values.global.registry }}/cert-portal:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8080
          env:
            - name: KEYCLOAK_URL
              value: https://keycloak-{{ .Release.Namespace }}.{{ .Values.global.domain }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm }}
            - name: KEYCLOAK_CLIENT_ID
              value: cert-portal
          resources:
            requests:
              cpu: {{ .Values.certPortal.resources.requests.cpu }}
              memory: {{ .Values.certPortal.resources.requests.memory }}
            limits:
              cpu: {{ .Values.certPortal.resources.limits.cpu }}
              memory: {{ .Values.certPortal.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cert-portal
spec:
  selector:
    app: cert-portal
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: cert-portal
spec:
  host: cert-portal-{{ .Release.Namespace }}.{{ .Values.global.domain }}
  to:
    kind: Service
    name: cert-portal
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
