{{- if .Values.grafana.enabled }}
# Grafana Dashboard — Fabric Network
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: fabric-network
  labels:
    {{- include "certchain-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  instanceSelector:
    matchLabels:
      dashboards: certchain
  json: >
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [

        {
          "title": "Fabric Version",
          "description": "Hyperledger Fabric version reported by peers",
          "type": "stat",
          "gridPos": { "h": 3, "w": 4, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "fabric_version{job=~\".*peer.*\"}",
              "legendFormat": "{{`{{version}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": { "mode": "fixed", "fixedColor": "text" },
              "mappings": [{ "type": "value", "options": { "1": { "text": "", "index": 0 } } }]
            }
          },
          "options": { "graphMode": "none", "textMode": "name", "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }
        },
        {
          "title": "Ledger Height",
          "description": "Current blockchain height (all peers should show the same value)",
          "type": "stat",
          "gridPos": { "h": 3, "w": 4, "x": 4, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(ledger_blockchain_height{job=~\".*peer.*\"})",
              "legendFormat": "blocks"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          },
          "options": { "graphMode": "area", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "title": "Endorsement Success %",
          "description": "Percentage of proposals successfully endorsed",
          "type": "stat",
          "gridPos": { "h": 3, "w": 4, "x": 8, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(endorser_successful_proposals{job=~\".*peer.*\"}) / sum(endorser_proposals_received{job=~\".*peer.*\"}) * 100",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 90 },
                  { "color": "green", "value": 99 }
                ]
              }
            }
          },
          "options": { "graphMode": "area", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }
        },
        {
          "title": "Proposals Received",
          "description": "Total endorsement proposals received across all peers",
          "type": "stat",
          "gridPos": { "h": 3, "w": 4, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(endorser_proposals_received{job=~\".*peer.*\"})",
              "legendFormat": "total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "green" }
            }
          },
          "options": { "graphMode": "area", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "title": "BFT Leader",
          "description": "Current SmartBFT consensus leader node ID",
          "type": "stat",
          "gridPos": { "h": 3, "w": 4, "x": 16, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "max(consensus_smartbft_view_leader_id{job=~\".*orderer.*\"})",
              "legendFormat": "node"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "color": { "mode": "fixed", "fixedColor": "purple" }
            }
          },
          "options": { "graphMode": "none", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }
        },
        {
          "title": "Gossip Peers",
          "description": "Known peers via gossip protocol (expected: 2 per org in 3-org setup)",
          "type": "stat",
          "gridPos": { "h": 3, "w": 4, "x": 20, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(gossip_membership_total_peers_known{job=~\".*peer.*\"})",
              "legendFormat": "total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "green", "value": 6 }
                ]
              }
            }
          },
          "options": { "graphMode": "none", "textMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value" }
        },

        {
          "title": "Endorsement Success / Failure",
          "description": "Successful (green) vs failed (red) endorsement proposals over time — a healthy network shows green only",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 3 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(endorser_successful_proposals{job=~\".*peer.*\"}[5m]))",
              "legendFormat": "Successful"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(endorser_endorsement_failures{job=~\".*peer.*\"}[5m]))",
              "legendFormat": "Failed"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(endorser_proposal_acl_failures{job=~\".*peer.*\"}[5m]))",
              "legendFormat": "ACL Rejected"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2, "stacking": { "mode": "none" } }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Successful" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }]
              },
              {
                "matcher": { "id": "byName", "options": "Failed" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }]
              },
              {
                "matcher": { "id": "byName", "options": "ACL Rejected" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }]
              }
            ]
          }
        },

        {
          "title": "Endorsement — Per Peer",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "collapsed": false
        },
        {
          "title": "Proposals Received Rate",
          "description": "Rate of incoming transaction proposals per peer",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 10 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(endorser_proposals_received{job=~\".*peer.*\"}[5m])",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Successful Proposals Rate",
          "description": "Rate of successfully endorsed proposals per peer",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 10 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(endorser_successful_proposals{job=~\".*peer.*\"}[5m])",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 },
              "color": { "mode": "palette-classic" }
            }
          }
        },
        {
          "title": "Endorsement Duration (p99)",
          "description": "99th percentile time to process and endorse a proposal",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 10 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(endorser_proposal_duration_bucket{job=~\".*peer.*\"}[5m]))",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },

        {
          "title": "Ledger & State Database",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 17 },
          "collapsed": false
        },
        {
          "title": "Block Commit Latency (p99)",
          "description": "Time to persist a block to the ledger file system",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 18 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(ledger_blockstorage_commit_time_bucket{job=~\".*peer.*\"}[5m]))",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "State DB Commit Latency (p99)",
          "description": "Time to update the CouchDB world state after a block commit",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 18 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(ledger_statedb_commit_time_bucket{job=~\".*peer.*\"}[5m]))",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "CouchDB Query Latency (p99)",
          "description": "Time for CouchDB requests — impacts endorsement and verification speed",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 18 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(couchdb_processing_time_bucket{job=~\".*peer.*\"}[5m]))",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },

        {
          "title": "SmartBFT Consensus (Orderers)",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 },
          "collapsed": false
        },
        {
          "title": "Consensus View",
          "description": "Current BFT view number, leader ID, and decision count (all orderers should agree)",
          "type": "table",
          "gridPos": { "h": 5, "w": 12, "x": 0, "y": 26 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "consensus_smartbft_view_leader_id{job=~\".*orderer.*\"}",
              "legendFormat": "",
              "format": "table",
              "instant": true,
              "refId": "leader"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "consensus_smartbft_view_number{job=~\".*orderer.*\"}",
              "legendFormat": "",
              "format": "table",
              "instant": true,
              "refId": "view"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "consensus_smartbft_view_decisions{job=~\".*orderer.*\"}",
              "legendFormat": "",
              "format": "table",
              "instant": true,
              "refId": "decisions"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": { "byField": "pod" }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": { "Time": true, "Time 1": true, "Time 2": true, "Time 3": true, "__name__": true, "__name__ 1": true, "__name__ 2": true, "channel": true, "channel 1": true, "channel 2": true, "container": true, "container 1": true, "container 2": true, "endpoint": true, "endpoint 1": true, "endpoint 2": true, "instance": true, "instance 1": true, "instance 2": true, "job": true, "job 1": true, "job 2": true, "namespace": true, "namespace 1": true, "namespace 2": true, "service": true, "service 1": true, "service 2": true },
                "renameByName": { "pod": "Orderer", "Value #leader": "Leader ID", "Value #view": "View #", "Value #decisions": "Decisions" }
              }
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "decimals": 0 },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Orderer" },
                "properties": [{ "id": "custom.width", "value": 200 }]
              }
            ]
          }
        },
        {
          "title": "BFT Committed Block Number",
          "description": "Latest committed block per orderer — orderers in sync show the same value",
          "type": "timeseries",
          "gridPos": { "h": 5, "w": 12, "x": 12, "y": 26 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "ledger_blockchain_height{job=~\".*orderer.*\"}",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 5, "lineWidth": 2, "showPoints": "always", "pointSize": 4 }
            }
          }
        },
        {
          "title": "SmartBFT Batch Processing Latency",
          "description": "Time to process a batch of transactions through BFT consensus",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 31 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(consensus_smartbft_view_latency_batch_processing_bucket{job=~\".*orderer.*\"}[5m]))",
              "legendFormat": "p99 {{`{{namespace}}`}}"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.5, rate(consensus_smartbft_view_latency_batch_processing_bucket{job=~\".*orderer.*\"}[5m]))",
              "legendFormat": "p50 {{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Transactions per Batch",
          "description": "Number of transactions per consensus batch — indicates throughput",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 31 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "consensus_smartbft_view_count_txs_in_batch{job=~\".*orderer.*\"}",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "bars", "fillOpacity": 50, "lineWidth": 1 }
            }
          }
        },
        {
          "title": "Request Pool & Broadcast Enqueue",
          "description": "Pending requests in pool (line) and time to enter ordering queue (area)",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 31 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "consensus_smartbft_pool_count_of_elements{job=~\".*orderer.*\"}",
              "legendFormat": "pool {{`{{namespace}}`}}"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(broadcast_enqueue_duration_bucket{job=~\".*orderer.*\"}[5m]))",
              "legendFormat": "enqueue p99 {{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": "enqueue.*" },
                "properties": [
                  { "id": "unit", "value": "s" },
                  { "id": "custom.axisPlacement", "value": "right" },
                  { "id": "custom.fillOpacity", "value": 30 },
                  { "id": "custom.drawStyle", "value": "line" }
                ]
              }
            ]
          }
        },

        {
          "title": "Chaincode & gRPC",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 38 },
          "collapsed": false
        },
        {
          "title": "Chaincode Shim Request Duration (p99)",
          "description": "Time for chaincode shim requests — the smart contract execution layer",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 39 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(chaincode_shim_request_duration_bucket{job=~\".*peer.*\"}[5m]))",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Chaincode Launch Failures & Timeouts",
          "description": "Chaincode initialization failures and execution timeouts",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 39 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(chaincode_launch_failures{job=~\".*peer.*\"}[5m])",
              "legendFormat": "launch fail ({{`{{namespace}}`}})"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(chaincode_execute_timeouts{job=~\".*peer.*\"}[5m])",
              "legendFormat": "timeout ({{`{{namespace}}`}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 },
              "color": { "mode": "fixed", "fixedColor": "red" }
            }
          }
        },
        {
          "title": "gRPC Stream Requests",
          "description": "gRPC streaming request rates across peers and orderers",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 39 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(grpc_server_stream_requests_received{job=~\".*peer.*|.*orderer.*\"}[5m])",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{service}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["certchain", "fabric", "blockchain", "smartbft"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "CertChain — Fabric Network",
      "uid": "certchain-fabric"
    }
{{- end }}
