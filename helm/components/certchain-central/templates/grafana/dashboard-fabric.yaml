{{- if .Values.grafana.enabled }}
# Grafana Dashboard — Fabric Network
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: fabric-network
  labels:
    {{- include "certchain-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  instanceSelector:
    matchLabels:
      dashboards: certchain
  json: >
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Peer — Proposals Received",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(endorser_proposals_received{job=~\".*peer.*\"}[5m])",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Peer — Endorsement Failures",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(endorser_proposal_failures{job=~\".*peer.*\"}[5m])",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "color": { "mode": "fixed", "fixedColor": "red" }
            }
          }
        },
        {
          "title": "Peer — Blocks Committed",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "ledger_blockstorage_commit_time_count{job=~\".*peer.*\"}",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "title": "Peer — Block Commit Latency (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(ledger_blockstorage_commit_time_bucket{job=~\".*peer.*\"}[5m]))",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Orderer — Blocks Cut",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(consensus_smartbft_committed_block_number{job=~\".*orderer.*\"}[5m])",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Orderer — Consensus Latency (p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, rate(broadcast_enqueue_duration_bucket{job=~\".*orderer.*\"}[5m]))",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "gRPC Active Connections",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "grpc_server_active_streams{job=~\".*peer.*|.*orderer.*\"}",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["certchain", "fabric", "blockchain"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "CertChain — Fabric Network",
      "uid": "certchain-fabric"
    }
{{- end }}
