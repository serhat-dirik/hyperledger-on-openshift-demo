{{- if .Values.grafana.enabled }}
# Grafana Dashboard — Application APIs
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: application-apis
  labels:
    {{- include "certchain-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  instanceSelector:
    matchLabels:
      dashboards: certchain
  json: >
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Certificates Issued (total)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(certificate_issued_total)",
              "legendFormat": "Issued"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "green" }
            }
          }
        },
        {
          "title": "Certificates Revoked (total)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(certificate_revoked_total)",
              "legendFormat": "Revoked"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "orange" }
            }
          }
        },
        {
          "title": "Certificates Verified (total)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(certificate_verified_total)",
              "legendFormat": "Verified"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          }
        },
        {
          "title": "Certificates Not Found (total)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(certificate_not_found_total)",
              "legendFormat": "Not Found"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "red" }
            }
          }
        },
        {
          "title": "Certificate Operations Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 4 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(certificate_issued_total[5m])",
              "legendFormat": "issued ({{`{{namespace}}`}})"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(certificate_revoked_total[5m])",
              "legendFormat": "revoked ({{`{{namespace}}`}})"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(certificate_verified_total[5m])",
              "legendFormat": "verified"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "HTTP Request Rate (cert-admin-api)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (uri, method) (rate(http_server_requests_seconds_count{job=~\".*cert-admin-api.*\"}[5m]))",
              "legendFormat": "{{`{{method}}`}} {{`{{uri}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "HTTP Request Rate (verify-api)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (uri, method) (rate(http_server_requests_seconds_count{job=~\".*verify-api.*\"}[5m]))",
              "legendFormat": "{{`{{method}}`}} {{`{{uri}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "HTTP Latency p99 (cert-admin-api)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=~\".*cert-admin-api.*\"}[5m])))",
              "legendFormat": "{{`{{uri}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "HTTP Latency p99 (verify-api)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=~\".*verify-api.*\"}[5m])))",
              "legendFormat": "{{`{{uri}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "JVM Heap Used",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 28 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_used_bytes{area=\"heap\", job=~\".*cert-admin-api.*|.*verify-api.*\"}",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "JVM GC Pauses",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 28 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(jvm_gc_pause_seconds_sum{job=~\".*cert-admin-api.*|.*verify-api.*\"}[5m])",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["certchain", "quarkus", "api"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "CertChain — Application APIs",
      "uid": "certchain-apps"
    }
{{- end }}
