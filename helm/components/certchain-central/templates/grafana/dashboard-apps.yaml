{{- if .Values.grafana.enabled }}
# Grafana Dashboard — Application APIs
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: application-apis
  labels:
    {{- include "certchain-central.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  instanceSelector:
    matchLabels:
      dashboards: certchain
  json: >
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Certificates Issued",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(certificate_issued_total)",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "green" }
            }
          },
          "options": { "graphMode": "area" }
        },
        {
          "title": "Certificates Revoked",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(certificate_revoked_total)",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "orange" }
            }
          },
          "options": { "graphMode": "area" }
        },
        {
          "title": "Certificates Verified",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(certificate_verified_total)",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "blue" }
            }
          },
          "options": { "graphMode": "area" }
        },
        {
          "title": "Not Found",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(certificate_not_found_total)",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "fixed", "fixedColor": "red" }
            }
          },
          "options": { "graphMode": "area" }
        },

        {
          "title": "Certificate Operations",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 4 },
          "collapsed": false
        },
        {
          "title": "Certificate Operations Rate",
          "description": "Rate of issue, revoke, and verify operations across all orgs",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(certificate_issued_total[5m])",
              "legendFormat": "issued ({{`{{namespace}}`}})"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(certificate_revoked_total[5m])",
              "legendFormat": "revoked ({{`{{namespace}}`}})"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(certificate_verified_total[5m])",
              "legendFormat": "verified"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Certificates Issued per Org",
          "description": "Cumulative certificates issued — broken down by organization namespace",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "certificate_issued_total",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 30, "lineWidth": 2, "stacking": { "mode": "normal" } }
            }
          }
        },

        {
          "title": "cert-admin-api (Per-Org)",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 13 },
          "collapsed": false
        },
        {
          "title": "HTTP Request Rate — cert-admin-api",
          "description": "Incoming request rate by method and URI path",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (uri, method) (rate(http_server_requests_seconds_count{job=~\".*cert-admin-api.*\"}[5m]))",
              "legendFormat": "{{`{{method}}`}} {{`{{uri}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "HTTP Latency p99 — cert-admin-api",
          "description": "99th percentile response time per URI",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=~\".*cert-admin-api.*\"}[5m])))",
              "legendFormat": "{{`{{uri}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "HTTP Errors — cert-admin-api",
          "description": "4xx and 5xx error rates — spikes indicate auth failures or backend issues",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 22 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (status) (rate(http_server_requests_seconds_count{job=~\".*cert-admin-api.*\", status=~\"4..\"}[5m]))",
              "legendFormat": "4xx ({{`{{status}}`}})"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (status) (rate(http_server_requests_seconds_count{job=~\".*cert-admin-api.*\", status=~\"5..\"}[5m]))",
              "legendFormat": "5xx ({{`{{status}}`}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            },
            "overrides": [
              {
                "matcher": { "id": "byRegexp", "options": "4xx.*" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }]
              },
              {
                "matcher": { "id": "byRegexp", "options": "5xx.*" },
                "properties": [{ "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }]
              }
            ]
          }
        },
        {
          "title": "Active HTTP Connections — cert-admin-api",
          "description": "Concurrent connections per org instance",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 22 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "http_server_active_requests{job=~\".*cert-admin-api.*\"}",
              "legendFormat": "{{`{{namespace}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 20, "lineWidth": 2 }
            }
          }
        },

        {
          "title": "verify-api (Central)",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 30 },
          "collapsed": false
        },
        {
          "title": "HTTP Request Rate — verify-api",
          "description": "Incoming request rate — public verification and authenticated transcript endpoints",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 31 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by (uri, method) (rate(http_server_requests_seconds_count{job=~\".*verify-api.*\"}[5m]))",
              "legendFormat": "{{`{{method}}`}} {{`{{uri}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "HTTP Latency p99 — verify-api",
          "description": "99th percentile response time — verification latency directly impacts user experience",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 31 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.99, sum by (le, uri) (rate(http_server_requests_seconds_bucket{job=~\".*verify-api.*\"}[5m])))",
              "legendFormat": "{{`{{uri}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },

        {
          "title": "JVM Runtime",
          "type": "row",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 39 },
          "collapsed": false
        },
        {
          "title": "JVM Heap Used",
          "description": "Heap memory usage across all Quarkus API pods",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 40 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_memory_used_bytes{area=\"heap\", job=~\".*cert-admin-api.*|.*verify-api.*\"}",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "JVM GC Pause Time",
          "description": "Garbage collection pause duration — spikes cause latency",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 40 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "rate(jvm_gc_pause_seconds_sum{job=~\".*cert-admin-api.*|.*verify-api.*\"}[5m])",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "JVM Threads",
          "description": "Active thread count per API pod",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 40 },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "jvm_threads_live_threads{job=~\".*cert-admin-api.*|.*verify-api.*\"}",
              "legendFormat": "{{`{{namespace}}`}}/{{`{{pod}}`}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["certchain", "quarkus", "api"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "CertChain — Application APIs",
      "uid": "certchain-apps"
    }
{{- end }}
