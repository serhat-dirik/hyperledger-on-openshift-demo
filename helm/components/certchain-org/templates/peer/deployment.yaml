# Fabric Peer — per-org blockchain node
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peer0
  labels:
    app: peer
    app.kubernetes.io/name: peer0
    {{- include "certchain-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: blockchain
    app.openshift.io/runtime: other
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    app.openshift.io/connects-to: '["couchdb","orderer0"]'
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: peer
  template:
    metadata:
      labels:
        app: peer
        app.kubernetes.io/name: peer0
        {{- include "certchain-org.labels" . | nindent 8 }}
        app.kubernetes.io/component: blockchain
        app.openshift.io/runtime: other
    spec:
      containers:
        - name: peer
          image: "{{ .Values.peer.image.repository }}:{{ .Values.peer.image.tag }}"
          ports:
            - containerPort: 7051
            - containerPort: 9443
              name: operations
          env:
            - name: FABRIC_LOGGING_SPEC
              value: INFO
            - name: CORE_PEER_ID
              value: peer0
            - name: CORE_PEER_LOCALMSPID
              value: {{ .Values.org.mspId }}
            - name: CORE_PEER_MSPCONFIGPATH
              value: /var/hyperledger/fabric/msp
            - name: CORE_PEER_ADDRESS
              value: peer0:7051
            - name: CORE_PEER_LISTENADDRESS
              value: 0.0.0.0:7051
            - name: CORE_PEER_GOSSIP_BOOTSTRAP
              value: peer0:7051
            - name: CORE_PEER_GOSSIP_EXTERNALENDPOINT
              value: peer0:7051
            - name: CORE_PEER_CHAINCODELISTENADDRESS
              value: 0.0.0.0:7052
            - name: CORE_PEER_CHAINCODEADDRESS
              value: peer0:7052
            - name: CORE_PEER_TLS_ENABLED
              value: "true"
            - name: CORE_PEER_TLS_CERT_FILE
              value: /var/hyperledger/fabric/tls/server.crt
            - name: CORE_PEER_TLS_KEY_FILE
              value: /var/hyperledger/fabric/tls/server.key
            - name: CORE_PEER_TLS_ROOTCERT_FILE
              value: /var/hyperledger/fabric/tls/ca.crt
            - name: CORE_LEDGER_STATE_STATEDATABASE
              value: CouchDB
            - name: CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS
              value: couchdb:5984
            - name: CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME
              value: admin
            - name: CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD
              value: adminpw
            - name: CORE_OPERATIONS_LISTENADDRESS
              value: "0.0.0.0:9443"
            - name: CORE_METRICS_PROVIDER
              value: prometheus
          volumeMounts:
            - name: msp-signcerts
              mountPath: /var/hyperledger/fabric/msp/signcerts
            - name: msp-keystore
              mountPath: /var/hyperledger/fabric/msp/keystore
            - name: msp-cacerts
              mountPath: /var/hyperledger/fabric/msp/cacerts
            - name: msp-tlscacerts
              mountPath: /var/hyperledger/fabric/msp/tlscacerts
            - name: msp-config
              mountPath: /var/hyperledger/fabric/msp/config.yaml
              subPath: config.yaml
            - name: tls
              mountPath: /var/hyperledger/fabric/tls
              readOnly: true
            - name: peer-data
              mountPath: /var/hyperledger/production
          resources:
            requests:
              cpu: {{ .Values.peer.resources.requests.cpu }}
              memory: {{ .Values.peer.resources.requests.memory }}
            limits:
              cpu: {{ .Values.peer.resources.limits.cpu }}
              memory: {{ .Values.peer.resources.limits.memory }}
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "peer node status"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "peer node status"
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: msp-signcerts
          secret:
            secretName: peer0-msp
            items:
              - key: signcerts
                path: cert.pem
        - name: msp-keystore
          secret:
            secretName: peer0-msp
            items:
              - key: keystore
                path: priv_sk
        - name: msp-cacerts
          secret:
            secretName: peer0-msp
            items:
              - key: cacerts
                path: ca-cert.pem
        - name: msp-tlscacerts
          secret:
            secretName: peer0-msp
            items:
              - key: tlscacerts
                path: tlsca-cert.pem
        - name: msp-config
          secret:
            secretName: peer0-msp
            items:
              - key: config.yaml
                path: config.yaml
        - name: tls
          secret:
            secretName: peer0-tls
        - name: peer-data
          persistentVolumeClaim:
            claimName: peer0-data
---
apiVersion: v1
kind: Service
metadata:
  name: peer0
  labels:
    app: peer
spec:
  selector:
    app: peer
  ports:
    - name: grpc
      port: 7051
      targetPort: 7051
    - name: chaincode
      port: 7052
      targetPort: 7052
    - name: operations
      port: 9443
      targetPort: 9443
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: peer0-data
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: peer
    {{- include "certchain-org.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.peer.storage }}
