# course-manager-ui — per-org registrar dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-manager-ui
  labels:
    app: course-manager-ui
    app.kubernetes.io/name: course-manager-ui
    {{- include "certchain-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
    app.openshift.io/runtime: nodejs
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    app.openshift.io/connects-to: '["cert-admin-api"]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: course-manager-ui
  template:
    metadata:
      labels:
        app: course-manager-ui
        app.kubernetes.io/name: course-manager-ui
        {{- include "certchain-org.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
        app.openshift.io/runtime: nodejs
    spec:
      containers:
        - name: course-manager-ui
          image: "image-registry.openshift-image-registry.svc:5000/{{ .Release.Namespace }}/course-manager-ui:{{ .Values.global.imageTag }}"
          ports:
            - containerPort: 8080
          env:
            - name: KEYCLOAK_URL
              value: https://keycloak-{{ include "certchain-org.namespace" . }}.{{ .Values.global.domain }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.org.name }}
            - name: KEYCLOAK_CLIENT_ID
              value: course-manager-ui
            - name: API_URL
              value: /api/v1
            - name: ORG_NAME
              value: {{ .Values.org.displayName | quote }}
            - name: ORG_ID
              value: {{ .Values.org.name }}
            - name: ORG_PRIMARY_COLOR
              value: {{ .Values.org.primaryColor | quote }}
          resources:
            requests:
              cpu: {{ .Values.courseManagerUi.resources.requests.cpu }}
              memory: {{ .Values.courseManagerUi.resources.requests.memory }}
            limits:
              cpu: {{ .Values.courseManagerUi.resources.limits.cpu }}
              memory: {{ .Values.courseManagerUi.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: course-manager-ui
spec:
  selector:
    app: course-manager-ui
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: course-manager-ui
spec:
  host: course-manager-ui-{{ include "certchain-org.namespace" . }}.{{ .Values.global.domain }}
  to:
    kind: Service
    name: course-manager-ui
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
