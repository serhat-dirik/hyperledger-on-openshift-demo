# CouchDB — Fabric peer state database (per-org)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: couchdb
  labels:
    app: couchdb
    app.kubernetes.io/name: couchdb
    {{- include "certchain-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
    app.openshift.io/runtime: other
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
        app.kubernetes.io/name: couchdb
        {{- include "certchain-org.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
        app.openshift.io/runtime: other
    spec:
      containers:
        - name: couchdb
          image: "{{ .Values.couchdb.image.repository }}:{{ .Values.couchdb.image.tag }}"
          ports:
            - containerPort: 5984
          env:
            - name: COUCHDB_USER
              value: admin
            - name: COUCHDB_PASSWORD
              value: adminpw
          volumeMounts:
            - name: data
              mountPath: /opt/couchdb/data
          resources:
            requests:
              cpu: {{ .Values.couchdb.resources.requests.cpu }}
              memory: {{ .Values.couchdb.resources.requests.memory }}
            limits:
              cpu: {{ .Values.couchdb.resources.limits.cpu }}
              memory: {{ .Values.couchdb.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /
              port: 5984
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5984
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: couchdb-data
---
apiVersion: v1
kind: Service
metadata:
  name: couchdb
spec:
  selector:
    app: couchdb
  ports:
    - name: http
      port: 5984
      targetPort: 5984
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: couchdb-data
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.couchdb.storage }}
