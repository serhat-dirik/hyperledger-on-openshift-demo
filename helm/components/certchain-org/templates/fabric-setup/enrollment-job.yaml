# Org enrollment Job — enrolls peer, orderer, and admin identities
apiVersion: batch/v1
kind: Job
metadata:
  name: org-enrollment
  labels:
    {{- include "certchain-org.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: fabric-setup
      restartPolicy: Never
      containers:
        - name: enrollment
          image: registry.access.redhat.com/ubi9/ubi:latest
          command: ["/bin/bash", "/scripts/org-enrollment.sh"]
          env:
            - name: ORG_NAME
              value: {{ .Values.org.name }}
            - name: ORG_NS
              value: {{ include "certchain-org.namespace" . }}
            - name: CENTRAL_NS
              value: {{ .Values.global.centralNamespace }}
            - name: DOMAIN_SUFFIX
              value: {{ .Values.global.domain }}
            - name: CA_URL
              value: "http://fabric-ca.{{ .Values.global.centralNamespace }}.svc.cluster.local:7054"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: msp-config
              mountPath: /msp-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: scripts
          configMap:
            name: fabric-setup-scripts
            defaultMode: 0755
        - name: msp-config
          configMap:
            name: msp-config
