# Fabric Orderer — per-org BFT consenter node
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderer
  labels:
    app: orderer
    app.kubernetes.io/name: orderer
    {{- include "certchain-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: blockchain
    app.openshift.io/runtime: other
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: orderer
  template:
    metadata:
      labels:
        app: orderer
        app.kubernetes.io/name: orderer
        {{- include "certchain-org.labels" . | nindent 8 }}
        app.kubernetes.io/component: blockchain
        app.openshift.io/runtime: other
    spec:
      containers:
        - name: orderer
          image: "{{ .Values.orderer.image.repository }}:{{ .Values.orderer.image.tag }}"
          ports:
            - containerPort: 7050
            - containerPort: 7053
              name: admin
            - containerPort: 8443
              name: operations
          env:
            - name: FABRIC_LOGGING_SPEC
              value: INFO
            - name: ORDERER_GENERAL_LISTENADDRESS
              value: "0.0.0.0"
            - name: ORDERER_GENERAL_LISTENPORT
              value: "7050"
            - name: ORDERER_GENERAL_LOCALMSPID
              value: {{ .Values.org.mspId }}
            - name: ORDERER_GENERAL_LOCALMSPDIR
              value: /var/hyperledger/orderer/msp
            - name: ORDERER_GENERAL_TLS_ENABLED
              value: "true"
            - name: ORDERER_GENERAL_TLS_PRIVATEKEY
              value: /var/hyperledger/orderer/tls/server.key
            - name: ORDERER_GENERAL_TLS_CERTIFICATE
              value: /var/hyperledger/orderer/tls/server.crt
            - name: ORDERER_GENERAL_TLS_ROOTCAS
              value: "[/var/hyperledger/orderer/tls/ca.crt]"
            - name: ORDERER_GENERAL_BOOTSTRAPMETHOD
              value: none
            - name: ORDERER_CHANNELPARTICIPATION_ENABLED
              value: "true"
            - name: ORDERER_ADMIN_LISTENADDRESS
              value: "0.0.0.0:7053"
            - name: ORDERER_ADMIN_TLS_ENABLED
              value: "true"
            - name: ORDERER_ADMIN_TLS_PRIVATEKEY
              value: /var/hyperledger/orderer/tls/server.key
            - name: ORDERER_ADMIN_TLS_CERTIFICATE
              value: /var/hyperledger/orderer/tls/server.crt
            - name: ORDERER_ADMIN_TLS_CLIENTAUTHREQUIRED
              value: "true"
            - name: ORDERER_ADMIN_TLS_CLIENTROOTCAS
              value: "[/var/hyperledger/orderer/tls/ca.crt]"
            - name: ORDERER_OPERATIONS_LISTENADDRESS
              value: "0.0.0.0:8443"
            - name: ORDERER_METRICS_PROVIDER
              value: prometheus
          volumeMounts:
            - name: msp-signcerts
              mountPath: /var/hyperledger/orderer/msp/signcerts
            - name: msp-keystore
              mountPath: /var/hyperledger/orderer/msp/keystore
            - name: msp-cacerts
              mountPath: /var/hyperledger/orderer/msp/cacerts
            - name: msp-tlscacerts
              mountPath: /var/hyperledger/orderer/msp/tlscacerts
            - name: msp-config
              mountPath: /var/hyperledger/orderer/msp/config.yaml
              subPath: config.yaml
            - name: tls
              mountPath: /var/hyperledger/orderer/tls
              readOnly: true
            - name: orderer-data
              mountPath: /var/hyperledger/production/orderer
          resources:
            requests:
              cpu: {{ .Values.orderer.resources.requests.cpu }}
              memory: {{ .Values.orderer.resources.requests.memory }}
            limits:
              cpu: {{ .Values.orderer.resources.limits.cpu }}
              memory: {{ .Values.orderer.resources.limits.memory }}
          readinessProbe:
            tcpSocket:
              port: 7050
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 7050
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: msp-signcerts
          secret:
            secretName: orderer-msp
            items:
              - key: signcerts
                path: cert.pem
        - name: msp-keystore
          secret:
            secretName: orderer-msp
            items:
              - key: keystore
                path: priv_sk
        - name: msp-cacerts
          secret:
            secretName: orderer-msp
            items:
              - key: cacerts
                path: ca-cert.pem
        - name: msp-tlscacerts
          secret:
            secretName: orderer-msp
            items:
              - key: tlscacerts
                path: tlsca-cert.pem
        - name: msp-config
          secret:
            secretName: orderer-msp
            items:
              - key: config.yaml
                path: config.yaml
        - name: tls
          secret:
            secretName: orderer-tls
        - name: orderer-data
          persistentVolumeClaim:
            claimName: orderer-data
---
apiVersion: v1
kind: Service
metadata:
  name: orderer
  labels:
    app: orderer
spec:
  selector:
    app: orderer
  ports:
    - name: grpc
      port: 7050
      targetPort: 7050
    - name: admin
      port: 7053
      targetPort: 7053
    - name: operations
      port: 8443
      targetPort: 8443
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orderer-data
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app: orderer
    {{- include "certchain-org.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.orderer.storage }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: orderer
  labels:
    app: orderer
    {{- include "certchain-org.labels" . | nindent 4 }}
spec:
  port:
    targetPort: grpc
  tls:
    termination: passthrough
  to:
    kind: Service
    name: orderer
    weight: 100
