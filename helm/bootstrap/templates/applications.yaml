# =============================================================================
# ArgoCD Application CRs — App of Apps (Wave 2)
# =============================================================================
# Creates child ArgoCD Applications pointing to the target repo (Gitea or fork).
# Wave 2 ensures Gitea is deployed (wave 0) and mirrored (wave 1) first.
# =============================================================================

{{- $targetRepo := include "bootstrap.targetRepoUrl" . -}}
{{- $targetRevision := include "bootstrap.targetRevision" . -}}

# --- UserInfo ConfigMap (RHDP integration) -----------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: certchain-userinfo
  namespace: {{ .Values.central.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    demo.redhat.com/userinfo: ""
    app.kubernetes.io/part-of: certchain
data:
  demo_title: "CertChain — Blockchain Academic Credentialing"
  access_instructions: |
    CertChain deploys a multi-org Hyperledger Fabric network with 3 training
    organizations (TechPulse, DataForge, NeuralPath) and a central verification
    portal. Open the Showroom lab guide for interactive walkthroughs.
  showroom_url: "https://showroom-{{ .Values.components.showroom.namespace | default "certchain-showroom" }}.{{ .Values.deployer.domain }}"
  cert_portal_url: "https://cert-portal-{{ .Values.central.namespace }}.{{ .Values.deployer.domain }}"
  argocd_url: "https://openshift-gitops-server-openshift-gitops.{{ .Values.deployer.domain }}"
  cluster_domain: "{{ .Values.deployer.domain }}"
{{- if .Values.gitea.enabled }}
  gitea_url: "https://gitea-{{ .Values.gitea.namespace }}.{{ .Values.deployer.domain }}"
{{- end }}

# --- Central infrastructure --------------------------------------------------
{{- if .Values.components.central.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: certchain-central
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/part-of: certchain
    demo.redhat.com/application: "certchain"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ $targetRepo }}
    targetRevision: {{ $targetRevision }}
    path: helm/components/certchain-central
    helm:
      valuesObject:
        global:
          domain: {{ .Values.deployer.domain }}
          registry: {{ .Values.images.registry }}
          imageTag: {{ .Values.images.tag | quote }}
        images:
          buildEnabled: {{ .Values.images.buildEnabled }}
        gitops:
          repoUrl: {{ $targetRepo }}
          revision: {{ $targetRevision }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.central.namespace }}
  ignoreDifferences:
    - group: grafana.integreatly.org
      kind: GrafanaDatasource
      jsonPointers:
        - /spec/datasource/secureJsonData
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
{{- end }}

# --- Per-org components (one Application per org) ----------------------------
{{- $orgs := list "techpulse" "dataforge" "neuralpath" }}
{{- range $orgKey := $orgs }}
{{- $orgConfig := index $.Values.components $orgKey }}
{{- if $orgConfig.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: certchain-{{ $orgKey }}
  namespace: {{ $.Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/part-of: certchain
    demo.redhat.com/application: "certchain"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $.Values.argocd.project }}
  source:
    repoURL: {{ $targetRepo }}
    targetRevision: {{ $targetRevision }}
    path: helm/components/certchain-org
    helm:
      valuesObject:
        global:
          domain: {{ $.Values.deployer.domain }}
          registry: {{ $.Values.images.registry }}
          imageTag: {{ $.Values.images.tag | quote }}
          centralNamespace: {{ $.Values.central.namespace }}
        images:
          buildEnabled: {{ $.Values.images.buildEnabled }}
        gitops:
          repoUrl: {{ $targetRepo }}
          revision: {{ $targetRevision }}
        org:
          name: {{ $orgConfig.org.name }}
          displayName: {{ $orgConfig.org.displayName }}
          mspId: {{ $orgConfig.org.mspId }}
          primaryColor: {{ $orgConfig.org.primaryColor | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ $.Values.central.namespace }}-{{ $orgKey }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
{{- end }}

# --- Showroom lab guide -------------------------------------------------------
{{- if .Values.components.showroom.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: certchain-showroom
  namespace: {{ .Values.argocd.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/part-of: certchain
    demo.redhat.com/application: "certchain"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.argocd.project }}
  source:
    repoURL: {{ $targetRepo }}
    targetRevision: {{ $targetRevision }}
    path: helm/components/certchain-showroom
    helm:
      valuesObject:
        global:
          domain: {{ .Values.deployer.domain }}
        showroom:
          content:
            repoUrl: {{ $targetRepo }}
            repoRef: {{ $targetRevision }}
            antoraPlaybook: "site.yml"
          terminal:
            enabled: {{ .Values.components.showroom.terminal.enabled }}
        demo:
          centralNamespace: {{ .Values.central.namespace }}
        gitea:
          enabled: {{ .Values.gitea.enabled }}
          url: "https://gitea-{{ .Values.gitea.namespace }}.{{ .Values.deployer.domain }}"
          orgName: {{ .Values.gitea.orgName }}
          repoName: {{ .Values.gitea.repoName }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.components.showroom.namespace | default "certchain-showroom" }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
{{- end }}
