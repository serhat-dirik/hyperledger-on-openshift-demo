{{- if .Values.gitea.enabled }}
# =============================================================================
# Gitea — Lightweight Git Server (Wave 0)
# =============================================================================
# Provides a local writable git repository for workshop participants.
# The mirror-job (wave 1) clones the public GitHub repo into Gitea.
# ArgoCD child apps (wave 2) point to Gitea as their source.
# =============================================================================

# --- PVC ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: {{ .Values.gitea.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: certchain
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.gitea.storage }}

---
# --- ConfigMap (app.ini) ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-config
  namespace: {{ .Values.gitea.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: certchain
data:
  app.ini: |
    APP_NAME = Gitea: Git with a cup of tea
    RUN_MODE = prod

    [server]
    ROOT_URL  = https://gitea-{{ .Values.gitea.namespace }}.{{ .Values.deployer.domain }}
    HTTP_PORT = 3000
    SSH_PORT  = 2222

    [database]
    DB_TYPE = sqlite3
    PATH    = /home/gitea/data/gitea.db

    [security]
    INSTALL_LOCK = true

    [service]
    DISABLE_REGISTRATION = false

    [repository]
    ROOT = /home/gitea/data/gitea-repositories
  start.sh: |
    #!/bin/sh
    set -e
    # Migrate DB schema (idempotent — needed before admin user create)
    /home/gitea/gitea migrate --config /home/gitea/conf/app.ini
    # Create admin user (idempotent — exits 0 if already exists)
    /home/gitea/gitea admin user create \
      --config /home/gitea/conf/app.ini \
      --admin \
      --username "{{ .Values.gitea.adminUser }}" \
      --password "{{ .Values.gitea.adminPassword }}" \
      --email "{{ .Values.gitea.adminUser }}@local.demo" \
      --must-change-password=false 2>/dev/null || true
    # Start Gitea
    exec /home/gitea/gitea web --config /home/gitea/conf/app.ini

---
# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: {{ .Values.gitea.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: certchain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
    spec:
      initContainers:
        - name: init-config
          image: {{ .Values.gitea.image }}
          command: ["sh", "-c", "cp /etc/gitea/app.ini /home/gitea/conf/app.ini && cp /etc/gitea/start.sh /home/gitea/conf/start.sh && chmod +x /home/gitea/conf/start.sh"]
          volumeMounts:
            - name: gitea-config-src
              mountPath: /etc/gitea
            - name: gitea-conf
              mountPath: /home/gitea/conf
      containers:
        - name: gitea
          image: {{ .Values.gitea.image }}
          command: ["/bin/sh", "/home/gitea/conf/start.sh"]
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 2222
              name: ssh
          volumeMounts:
            - name: gitea-data
              mountPath: /home/gitea/data
            - name: gitea-conf
              mountPath: /home/gitea/conf
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data
        - name: gitea-config-src
          configMap:
            name: gitea-config
        - name: gitea-conf
          emptyDir: {}

---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: {{ .Values.gitea.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: certchain
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: gitea

---
# --- Route ---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gitea
  namespace: {{ .Values.gitea.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: certchain
spec:
  to:
    kind: Service
    name: gitea
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
