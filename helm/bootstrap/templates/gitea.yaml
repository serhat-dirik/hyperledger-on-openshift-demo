{{- if .Values.gitea.enabled }}
# =============================================================================
# Gitea — Lightweight Git Server (Wave 0)
# =============================================================================
# Provides a local writable git repository for workshop participants.
# The mirror-job (wave 1) clones the public GitHub repo into Gitea.
# ArgoCD child apps (wave 2) point to Gitea as their source.
# =============================================================================

# --- PVC ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: {{ .Values.gitea.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: certchain
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.gitea.storage }}

---
# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: {{ .Values.gitea.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: certchain
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea
    spec:
      containers:
        - name: gitea
          image: {{ .Values.gitea.image }}
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 2222
              name: ssh
          env:
            - name: GITEA__server__ROOT_URL
              value: "https://gitea-{{ .Values.gitea.namespace }}.{{ .Values.deployer.domain }}"
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "false"
          volumeMounts:
            - name: gitea-data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: gitea-data
          persistentVolumeClaim:
            claimName: gitea-data

---
# --- Service ---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: {{ .Values.gitea.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: certchain
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: gitea

---
# --- Route ---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: gitea
  namespace: {{ .Values.gitea.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: gitea
    app.kubernetes.io/part-of: certchain
spec:
  to:
    kind: Service
    name: gitea
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
