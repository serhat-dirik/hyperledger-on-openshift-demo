<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34a853"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea4335"/>
    </marker>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Certificate Lifecycle</text>

  <!-- ===== ISSUE FLOW ===== -->
  <text x="20" y="68" font-size="17" font-weight="bold" fill="#1a73e8">Issue Flow</text>

  <!-- Row 1: Submit → API Call → Endorse -->
  <rect x="20" y="80" width="200" height="60" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5" filter="url(#s)"/>
  <text x="120" y="106" text-anchor="middle" font-weight="bold" font-size="15" fill="#1a73e8">1. Submit</text>
  <text x="120" y="126" text-anchor="middle" font-size="12" fill="#555">Registrar → Course Manager UI</text>

  <line x1="220" y1="110" x2="248" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="250" y="80" width="200" height="60" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5" filter="url(#s)"/>
  <text x="350" y="106" text-anchor="middle" font-weight="bold" font-size="15" fill="#1a73e8">2. API Call</text>
  <text x="350" y="126" text-anchor="middle" font-size="12" fill="#555">cert-admin-api (JWT + role)</text>

  <line x1="450" y1="110" x2="478" y2="110" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="480" y="80" width="200" height="60" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" filter="url(#s)"/>
  <text x="580" y="106" text-anchor="middle" font-weight="bold" font-size="15" fill="#c2185b">3. Endorse</text>
  <text x="580" y="126" text-anchor="middle" font-size="12" fill="#555">Peer signs read-write set</text>

  <!-- Row 2: Order → Commit → Index -->
  <line x1="580" y1="140" x2="580" y2="160" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="480" y="162" width="200" height="60" rx="8" fill="#fbe9e7" stroke="#ea4335" stroke-width="1.5" filter="url(#s)"/>
  <text x="580" y="188" text-anchor="middle" font-weight="bold" font-size="15" fill="#ea4335">4. Order</text>
  <text x="580" y="208" text-anchor="middle" font-size="12" fill="#555">SmartBFT consensus (4 nodes)</text>

  <line x1="478" y1="192" x2="452" y2="192" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="250" y="162" width="200" height="60" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="350" y="188" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">5. Commit</text>
  <text x="350" y="208" text-anchor="middle" font-size="12" fill="#555">Block persisted to all peers</text>

  <line x1="248" y1="192" x2="222" y2="192" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="20" y="162" width="200" height="60" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="120" y="188" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">6. Index</text>
  <text x="120" y="208" text-anchor="middle" font-size="12" fill="#555">CouchDB world state updated</text>

  <!-- ===== VERIFY FLOW ===== -->
  <text x="20" y="262" font-size="17" font-weight="bold" fill="#34a853">Verify Flow</text>

  <rect x="20" y="274" width="155" height="60" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="97" y="300" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">1. Enter ID</text>
  <text x="97" y="320" text-anchor="middle" font-size="12" fill="#555">cert-portal (public)</text>

  <line x1="175" y1="304" x2="198" y2="304" stroke="#34a853" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <rect x="200" y="274" width="155" height="60" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="277" y="300" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">2. Query</text>
  <text x="277" y="320" text-anchor="middle" font-size="12" fill="#555">verify-api → peer</text>

  <line x1="355" y1="304" x2="378" y2="304" stroke="#34a853" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <rect x="380" y="274" width="155" height="60" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="457" y="300" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">3. Result</text>
  <text x="457" y="320" text-anchor="middle" font-size="12" fill="#555">VALID / REVOKED / ...</text>

  <!-- Privacy box -->
  <rect x="555" y="268" width="130" height="72" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1.5" filter="url(#s)"/>
  <text x="620" y="292" text-anchor="middle" font-weight="bold" font-size="13" fill="#e65100">Privacy</text>
  <text x="620" y="310" text-anchor="middle" font-size="11" fill="#555">Anonymous →</text>
  <text x="620" y="325" text-anchor="middle" font-size="11" fill="#555">public fields only</text>

  <!-- ===== REVOKE FLOW ===== -->
  <text x="20" y="375" font-size="17" font-weight="bold" fill="#ea4335">Revoke Flow</text>

  <rect x="20" y="387" width="200" height="55" rx="8" fill="#fbe9e7" stroke="#ea4335" stroke-width="1.5" filter="url(#s)"/>
  <text x="120" y="411" text-anchor="middle" font-weight="bold" font-size="15" fill="#ea4335">1. Revoke</text>
  <text x="120" y="430" text-anchor="middle" font-size="12" fill="#555">Admin clicks Revoke</text>

  <line x1="220" y1="414" x2="248" y2="414" stroke="#ea4335" stroke-width="1.5" marker-end="url(#arrRed)"/>

  <rect x="250" y="387" width="200" height="55" rx="8" fill="#fbe9e7" stroke="#ea4335" stroke-width="1.5" filter="url(#s)"/>
  <text x="350" y="411" text-anchor="middle" font-weight="bold" font-size="15" fill="#ea4335">2. New Tx</text>
  <text x="350" y="430" text-anchor="middle" font-size="12" fill="#555">Blockchain records change</text>

  <line x1="450" y1="414" x2="478" y2="414" stroke="#ea4335" stroke-width="1.5" marker-end="url(#arrRed)"/>

  <rect x="480" y="387" width="200" height="55" rx="8" fill="#fbe9e7" stroke="#ea4335" stroke-width="1.5" filter="url(#s)"/>
  <text x="580" y="411" text-anchor="middle" font-weight="bold" font-size="15" fill="#ea4335">3. REVOKED</text>
  <text x="580" y="430" text-anchor="middle" font-size="12" fill="#555">Irreversible — audit preserved</text>

  <!-- Footer -->
  <text x="350" y="470" text-anchor="middle" font-size="12" fill="#999">Read operations (Verify) do not create transactions. Write operations (Issue, Revoke) are permanently recorded on the blockchain.</text>
</svg>
