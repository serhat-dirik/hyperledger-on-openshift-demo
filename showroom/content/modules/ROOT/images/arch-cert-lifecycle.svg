<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34a853"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea4335"/>
    </marker>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="240" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Certificate Lifecycle</text>

  <!-- ===== ISSUE FLOW ===== -->
  <text x="15" y="60" font-size="16" font-weight="bold" fill="#1a73e8">Issue Flow</text>

  <!-- Row 1 -->
  <rect x="15" y="72" width="215" height="58" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5" filter="url(#s)"/>
  <text x="122" y="97" text-anchor="middle" font-weight="bold" font-size="15" fill="#1a73e8">1. Submit</text>
  <text x="122" y="117" text-anchor="middle" font-size="12" fill="#555">Registrar → Course Manager UI</text>

  <line x1="230" y1="101" x2="248" y2="101" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="250" y="72" width="215" height="58" rx="8" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5" filter="url(#s)"/>
  <text x="357" y="97" text-anchor="middle" font-weight="bold" font-size="15" fill="#1a73e8">2. API Call</text>
  <text x="357" y="117" text-anchor="middle" font-size="12" fill="#555">cert-admin-api (JWT + role)</text>

  <!-- Row 2 -->
  <rect x="15" y="146" width="215" height="58" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" filter="url(#s)"/>
  <text x="122" y="171" text-anchor="middle" font-weight="bold" font-size="15" fill="#c2185b">3. Endorse</text>
  <text x="122" y="191" text-anchor="middle" font-size="12" fill="#555">Peer signs read-write set</text>

  <line x1="230" y1="175" x2="248" y2="175" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="250" y="146" width="215" height="58" rx="8" fill="#fbe9e7" stroke="#ea4335" stroke-width="1.5" filter="url(#s)"/>
  <text x="357" y="171" text-anchor="middle" font-weight="bold" font-size="15" fill="#ea4335">4. Order</text>
  <text x="357" y="191" text-anchor="middle" font-size="12" fill="#555">SmartBFT consensus (4 nodes)</text>

  <!-- Row 3 -->
  <rect x="15" y="220" width="215" height="58" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="122" y="245" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">5. Commit</text>
  <text x="122" y="265" text-anchor="middle" font-size="12" fill="#555">Block persisted to all peers</text>

  <line x1="230" y1="249" x2="248" y2="249" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="250" y="220" width="215" height="58" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="357" y="245" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">6. Index</text>
  <text x="357" y="265" text-anchor="middle" font-size="12" fill="#555">CouchDB world state updated</text>

  <!-- Flow arrows between rows -->
  <line x1="357" y1="130" x2="122" y2="146" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="357" y1="204" x2="122" y2="220" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== VERIFY FLOW ===== -->
  <text x="15" y="316" font-size="16" font-weight="bold" fill="#34a853">Verify Flow</text>

  <rect x="15" y="328" width="140" height="58" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="85" y="353" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">1. Enter ID</text>
  <text x="85" y="373" text-anchor="middle" font-size="12" fill="#555">cert-portal</text>

  <line x1="155" y1="357" x2="173" y2="357" stroke="#34a853" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <rect x="175" y="328" width="140" height="58" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="245" y="353" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">2. Query</text>
  <text x="245" y="373" text-anchor="middle" font-size="12" fill="#555">verify-api → peer</text>

  <line x1="315" y1="357" x2="333" y2="357" stroke="#34a853" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <rect x="335" y="328" width="130" height="58" rx="8" fill="#e8f5e9" stroke="#34a853" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="353" text-anchor="middle" font-weight="bold" font-size="15" fill="#34a853">3. Result</text>
  <text x="400" y="373" text-anchor="middle" font-size="11" fill="#555">VALID / REVOKED</text>

  <!-- Privacy note -->
  <rect x="15" y="400" width="450" height="35" rx="6" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="240" y="422" text-anchor="middle" font-size="13" fill="#e65100">🔒 Public fields only for anonymous. Cert owner (JWT) sees grade + degree.</text>

  <!-- ===== REVOKE FLOW ===== -->
  <text x="15" y="470" font-size="16" font-weight="bold" fill="#ea4335">Revoke Flow</text>

  <rect x="15" y="482" width="140" height="55" rx="8" fill="#fbe9e7" stroke="#ea4335" stroke-width="1.5" filter="url(#s)"/>
  <text x="85" y="507" text-anchor="middle" font-weight="bold" font-size="15" fill="#ea4335">1. Revoke</text>
  <text x="85" y="525" text-anchor="middle" font-size="12" fill="#555">Admin action</text>

  <line x1="155" y1="509" x2="173" y2="509" stroke="#ea4335" stroke-width="1.5" marker-end="url(#arrRed)"/>

  <rect x="175" y="482" width="140" height="55" rx="8" fill="#fbe9e7" stroke="#ea4335" stroke-width="1.5" filter="url(#s)"/>
  <text x="245" y="507" text-anchor="middle" font-weight="bold" font-size="15" fill="#ea4335">2. New Tx</text>
  <text x="245" y="525" text-anchor="middle" font-size="12" fill="#555">Blockchain record</text>

  <line x1="315" y1="509" x2="333" y2="509" stroke="#ea4335" stroke-width="1.5" marker-end="url(#arrRed)"/>

  <rect x="335" y="482" width="130" height="55" rx="8" fill="#fbe9e7" stroke="#ea4335" stroke-width="1.5" filter="url(#s)"/>
  <text x="400" y="507" text-anchor="middle" font-weight="bold" font-size="15" fill="#ea4335">3. REVOKED</text>
  <text x="400" y="525" text-anchor="middle" font-size="12" fill="#555">Irreversible</text>

  <!-- Footer -->
  <text x="240" y="575" text-anchor="middle" font-size="12" fill="#999">Read (Verify) = no transaction. Write (Issue, Revoke) = permanent blockchain record.</text>
</svg>
