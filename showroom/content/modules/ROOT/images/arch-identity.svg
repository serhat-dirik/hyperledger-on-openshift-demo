<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">
  <defs>
    <marker id="a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="aP" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Identity Architecture — Keycloak + Fabric MSP</text>

  <!-- ===== Users (left) ===== -->
  <rect x="20" y="60" width="140" height="55" rx="25" fill="#1a73e8" filter="url(#sh)"/>
  <text x="90" y="84" text-anchor="middle" font-weight="600" font-size="15" fill="#fff">Registrar</text>
  <text x="90" y="102" text-anchor="middle" font-size="11" fill="#ccc">admin@techpulse.demo</text>

  <rect x="20" y="135" width="140" height="55" rx="25" fill="#34a853" filter="url(#sh)"/>
  <text x="90" y="159" text-anchor="middle" font-weight="600" font-size="15" fill="#fff">Student</text>
  <text x="90" y="177" text-anchor="middle" font-size="11" fill="#ccc">student01@tp.demo</text>

  <rect x="20" y="210" width="140" height="55" rx="25" fill="#fbbc04" filter="url(#sh)"/>
  <text x="90" y="234" text-anchor="middle" font-weight="600" font-size="15" fill="#fff">Employer</text>
  <text x="90" y="252" text-anchor="middle" font-size="11" fill="#ccc">No login required</text>

  <!-- User arrows to Central KC -->
  <line x1="160" y1="87" x2="208" y2="130" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="160" y1="162" x2="208" y2="162" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ===== Central Keycloak (center) ===== -->
  <rect x="210" y="55" width="250" height="235" rx="12" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" filter="url(#sh)"/>
  <text x="335" y="82" text-anchor="middle" font-size="18" font-weight="bold" fill="#7b1fa2">Central Keycloak</text>
  <text x="335" y="102" text-anchor="middle" font-size="12" fill="#666">certchain namespace</text>

  <!-- Organizations -->
  <rect x="225" y="115" width="220" height="32" rx="6" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
  <text x="335" y="137" text-anchor="middle" font-weight="600" font-size="14" fill="#7b1fa2">Organizations</text>

  <rect x="225" y="156" width="70" height="30" rx="5" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="260" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#c2185b">TechPulse</text>

  <rect x="300" y="156" width="70" height="30" rx="5" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
  <text x="335" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#283593">DataForge</text>

  <rect x="375" y="156" width="72" height="30" rx="5" fill="#e0f2f1" stroke="#009688" stroke-width="1"/>
  <text x="411" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#00695c">NeuralPath</text>

  <!-- Identity Providers -->
  <rect x="225" y="198" width="220" height="32" rx="6" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
  <text x="335" y="220" text-anchor="middle" font-weight="600" font-size="14" fill="#7b1fa2">Identity Providers (OIDC)</text>

  <rect x="225" y="239" width="70" height="30" rx="5" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="260" y="259" text-anchor="middle" font-size="12" fill="#c2185b">TP IdP</text>

  <rect x="300" y="239" width="70" height="30" rx="5" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
  <text x="335" y="259" text-anchor="middle" font-size="12" fill="#283593">DF IdP</text>

  <rect x="375" y="239" width="72" height="30" rx="5" fill="#e0f2f1" stroke="#009688" stroke-width="1"/>
  <text x="411" y="259" text-anchor="middle" font-size="12" fill="#00695c">NP IdP</text>

  <!-- ===== Org Keycloaks (right column) ===== -->
  <!-- TechPulse KC -->
  <rect x="510" y="55" width="175" height="80" rx="10" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" filter="url(#sh)"/>
  <text x="597" y="80" text-anchor="middle" font-weight="bold" font-size="15" fill="#c2185b">TechPulse KC</text>
  <text x="597" y="100" text-anchor="middle" font-size="11" fill="#666">certchain-techpulse</text>
  <text x="597" y="118" text-anchor="middle" font-size="11" fill="#888">admin, student01, student02</text>

  <!-- DataForge KC -->
  <rect x="510" y="150" width="175" height="80" rx="10" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1.5" filter="url(#sh)"/>
  <text x="597" y="175" text-anchor="middle" font-weight="bold" font-size="15" fill="#283593">DataForge KC</text>
  <text x="597" y="195" text-anchor="middle" font-size="11" fill="#666">certchain-dataforge</text>
  <text x="597" y="213" text-anchor="middle" font-size="11" fill="#888">admin, student03, student04</text>

  <!-- NeuralPath KC -->
  <rect x="510" y="245" width="175" height="80" rx="10" fill="#e0f2f1" stroke="#009688" stroke-width="1.5" filter="url(#sh)"/>
  <text x="597" y="270" text-anchor="middle" font-weight="bold" font-size="15" fill="#00695c">NeuralPath KC</text>
  <text x="597" y="290" text-anchor="middle" font-size="11" fill="#666">certchain-neuralpath</text>
  <text x="597" y="308" text-anchor="middle" font-size="11" fill="#888">admin, student05, student06</text>

  <!-- Brokering arrows: Central KC → Org KCs -->
  <line x1="460" y1="254" x2="508" y2="95" stroke="#9c27b0" stroke-width="2" marker-end="url(#aP)"/>
  <line x1="460" y1="254" x2="508" y2="190" stroke="#9c27b0" stroke-width="2" marker-end="url(#aP)"/>
  <line x1="460" y1="260" x2="508" y2="285" stroke="#9c27b0" stroke-width="2" marker-end="url(#aP)"/>

  <!-- Brokering label -->
  <rect x="464" y="170" width="40" height="22" rx="10" fill="#9c27b0"/>
  <text x="484" y="186" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">OIDC</text>

  <!-- ===== Fabric MSP (bottom) ===== -->
  <rect x="20" y="340" width="665" height="100" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#sh)"/>
  <text x="350" y="367" text-anchor="middle" font-size="18" font-weight="bold" fill="#2e7d32">Fabric MSP — X.509 Certificates</text>

  <rect x="40" y="382" width="190" height="42" rx="6" fill="#fff" stroke="#e91e63" stroke-width="1"/>
  <text x="135" y="400" text-anchor="middle" font-weight="600" font-size="13" fill="#c2185b">TechPulseMSP</text>
  <text x="135" y="416" text-anchor="middle" font-size="11" fill="#666">admin-msp, peer0-tls, orderer-tls</text>

  <rect x="255" y="382" width="190" height="42" rx="6" fill="#fff" stroke="#3f51b5" stroke-width="1"/>
  <text x="350" y="400" text-anchor="middle" font-weight="600" font-size="13" fill="#283593">DataForgeMSP</text>
  <text x="350" y="416" text-anchor="middle" font-size="11" fill="#666">admin-msp, peer0-tls, orderer-tls</text>

  <rect x="470" y="382" width="190" height="42" rx="6" fill="#fff" stroke="#009688" stroke-width="1"/>
  <text x="565" y="400" text-anchor="middle" font-weight="600" font-size="13" fill="#00695c">NeuralPathMSP</text>
  <text x="565" y="416" text-anchor="middle" font-size="11" fill="#666">admin-msp, peer0-tls, orderer-tls</text>

  <!-- Org KC → MSP arrows -->
  <line x1="597" y1="135" x2="135" y2="380" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <line x1="597" y1="230" x2="350" y2="380" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <line x1="597" y1="325" x2="565" y2="380" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>

  <!-- Flow explanation -->
  <rect x="20" y="460" width="665" height="85" rx="10" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#sh)"/>
  <text x="350" y="485" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Identity Brokering Flow</text>
  <text x="350" y="507" text-anchor="middle" font-size="13" fill="#555">1. User clicks "Sign In" on cert-portal → redirected to Central Keycloak</text>
  <text x="350" y="525" text-anchor="middle" font-size="13" fill="#555">2. Central KC detects org from email → redirects to Org Keycloak → authenticates → token returned</text>
</svg>
