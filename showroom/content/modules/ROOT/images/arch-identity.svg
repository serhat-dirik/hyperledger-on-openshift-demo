<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 620" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">
  <defs>
    <marker id="a" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="aP" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="240" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">Identity Architecture</text>

  <!-- ===== Users ===== -->
  <rect x="15" y="50" width="130" height="48" rx="22" fill="#1a73e8" filter="url(#sh)"/>
  <text x="80" y="72" text-anchor="middle" font-weight="600" font-size="14" fill="#fff">Registrar</text>
  <text x="80" y="88" text-anchor="middle" font-size="10" fill="#ccc">admin@techpulse.demo</text>

  <rect x="15" y="110" width="130" height="48" rx="22" fill="#34a853" filter="url(#sh)"/>
  <text x="80" y="132" text-anchor="middle" font-weight="600" font-size="14" fill="#fff">Student</text>
  <text x="80" y="148" text-anchor="middle" font-size="10" fill="#ccc">student01@tp.demo</text>

  <rect x="15" y="170" width="130" height="48" rx="22" fill="#fbbc04" filter="url(#sh)"/>
  <text x="80" y="192" text-anchor="middle" font-weight="600" font-size="14" fill="#fff">Employer</text>
  <text x="80" y="208" text-anchor="middle" font-size="10" fill="#ccc">No login required</text>

  <!-- Arrows to Central KC -->
  <line x1="145" y1="74" x2="168" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="145" y1="134" x2="168" y2="134" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ===== Central Keycloak ===== -->
  <rect x="170" y="50" width="295" height="185" rx="12" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" filter="url(#sh)"/>
  <text x="317" y="75" text-anchor="middle" font-size="17" font-weight="bold" fill="#7b1fa2">Central Keycloak</text>
  <text x="317" y="93" text-anchor="middle" font-size="12" fill="#666">certchain namespace — federation hub</text>

  <!-- Organizations row -->
  <rect x="185" y="105" width="265" height="28" rx="5" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
  <text x="317" y="124" text-anchor="middle" font-weight="600" font-size="13" fill="#7b1fa2">Organizations</text>

  <rect x="185" y="140" width="85" height="26" rx="4" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="227" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#c2185b">TechPulse</text>

  <rect x="275" y="140" width="85" height="26" rx="4" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
  <text x="317" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#283593">DataForge</text>

  <rect x="365" y="140" width="85" height="26" rx="4" fill="#e0f2f1" stroke="#009688" stroke-width="1"/>
  <text x="407" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#00695c">NeuralPath</text>

  <!-- Identity Providers row -->
  <rect x="185" y="178" width="265" height="28" rx="5" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
  <text x="317" y="197" text-anchor="middle" font-weight="600" font-size="13" fill="#7b1fa2">Identity Providers (OIDC)</text>

  <rect x="185" y="212" width="85" height="20" rx="4" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="227" y="226" text-anchor="middle" font-size="11" fill="#c2185b">TP IdP</text>

  <rect x="275" y="212" width="85" height="20" rx="4" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1"/>
  <text x="317" y="226" text-anchor="middle" font-size="11" fill="#283593">DF IdP</text>

  <rect x="365" y="212" width="85" height="20" rx="4" fill="#e0f2f1" stroke="#009688" stroke-width="1"/>
  <text x="407" y="226" text-anchor="middle" font-size="11" fill="#00695c">NP IdP</text>

  <!-- ===== Org Keycloaks (stacked vertically) ===== -->
  <rect x="15" y="258" width="145" height="75" rx="10" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" filter="url(#sh)"/>
  <text x="87" y="280" text-anchor="middle" font-weight="bold" font-size="14" fill="#c2185b">TechPulse KC</text>
  <text x="87" y="298" text-anchor="middle" font-size="11" fill="#666">admin, student01, 02</text>
  <text x="87" y="316" text-anchor="middle" font-size="11" fill="#888">Roles: org-admin, user</text>

  <rect x="170" y="258" width="145" height="75" rx="10" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1.5" filter="url(#sh)"/>
  <text x="242" y="280" text-anchor="middle" font-weight="bold" font-size="14" fill="#283593">DataForge KC</text>
  <text x="242" y="298" text-anchor="middle" font-size="11" fill="#666">admin, student03, 04</text>
  <text x="242" y="316" text-anchor="middle" font-size="11" fill="#888">Roles: org-admin, user</text>

  <rect x="325" y="258" width="145" height="75" rx="10" fill="#e0f2f1" stroke="#009688" stroke-width="1.5" filter="url(#sh)"/>
  <text x="397" y="280" text-anchor="middle" font-weight="bold" font-size="14" fill="#00695c">NeuralPath KC</text>
  <text x="397" y="298" text-anchor="middle" font-size="11" fill="#666">admin, student05, 06</text>
  <text x="397" y="316" text-anchor="middle" font-size="11" fill="#888">Roles: org-admin, user</text>

  <!-- Brokering arrows -->
  <line x1="227" y1="232" x2="87" y2="258" stroke="#9c27b0" stroke-width="2" marker-end="url(#aP)"/>
  <line x1="317" y1="235" x2="242" y2="258" stroke="#9c27b0" stroke-width="2" marker-end="url(#aP)"/>
  <line x1="407" y1="232" x2="397" y2="258" stroke="#9c27b0" stroke-width="2" marker-end="url(#aP)"/>

  <!-- Brokering label -->
  <rect x="200" y="242" width="80" height="18" rx="8" fill="#9c27b0"/>
  <text x="240" y="255" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">OIDC Broker</text>

  <!-- ===== Fabric MSP ===== -->
  <rect x="15" y="360" width="450" height="110" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#sh)"/>
  <text x="240" y="385" text-anchor="middle" font-size="17" font-weight="bold" fill="#2e7d32">Fabric MSP — X.509 Certificates</text>

  <rect x="30" y="398" width="130" height="55" rx="6" fill="#fff" stroke="#e91e63" stroke-width="1"/>
  <text x="95" y="418" text-anchor="middle" font-weight="600" font-size="13" fill="#c2185b">TechPulseMSP</text>
  <text x="95" y="436" text-anchor="middle" font-size="10" fill="#666">admin-msp, peer0-tls</text>
  <text x="95" y="448" text-anchor="middle" font-size="10" fill="#666">orderer-msp, orderer-tls</text>

  <rect x="175" y="398" width="130" height="55" rx="6" fill="#fff" stroke="#3f51b5" stroke-width="1"/>
  <text x="240" y="418" text-anchor="middle" font-weight="600" font-size="13" fill="#283593">DataForgeMSP</text>
  <text x="240" y="436" text-anchor="middle" font-size="10" fill="#666">admin-msp, peer0-tls</text>
  <text x="240" y="448" text-anchor="middle" font-size="10" fill="#666">orderer-msp, orderer-tls</text>

  <rect x="320" y="398" width="130" height="55" rx="6" fill="#fff" stroke="#009688" stroke-width="1"/>
  <text x="385" y="418" text-anchor="middle" font-weight="600" font-size="13" fill="#00695c">NeuralPathMSP</text>
  <text x="385" y="436" text-anchor="middle" font-size="10" fill="#666">admin-msp, peer0-tls</text>
  <text x="385" y="448" text-anchor="middle" font-size="10" fill="#666">orderer-msp, orderer-tls</text>

  <!-- Org KC → MSP arrows -->
  <line x1="87" y1="333" x2="95" y2="396" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <line x1="242" y1="333" x2="240" y2="396" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <line x1="397" y1="333" x2="385" y2="396" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>

  <!-- Flow explanation -->
  <rect x="15" y="490" width="450" height="115" rx="10" fill="#fff" stroke="#ddd" stroke-width="1" filter="url(#sh)"/>
  <text x="240" y="515" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Identity Brokering Flow</text>
  <text x="240" y="540" text-anchor="middle" font-size="13" fill="#555">1. User clicks "Sign In" on cert-portal</text>
  <text x="240" y="558" text-anchor="middle" font-size="13" fill="#555">2. Central KC detects org from email domain</text>
  <text x="240" y="576" text-anchor="middle" font-size="13" fill="#555">3. Redirects to Org KC → authenticate → token returned</text>
  <text x="240" y="594" text-anchor="middle" font-size="13" fill="#555">4. Token includes org-specific claims (roles, org ID)</text>
</svg>
