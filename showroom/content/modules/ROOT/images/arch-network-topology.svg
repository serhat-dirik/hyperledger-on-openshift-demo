  <text x="170" y="470" text-anchor="middle" font-weight="600" font-size="13" fill="#f29900">course-mgr</text>
  <text x="170" y="488" text-anchor="middle" font-size="11" fill="#666">React</text>

  <rect x="25" y="506" width="90" height="28" rx="5" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
