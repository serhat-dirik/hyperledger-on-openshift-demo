  <rect x="240" y="308" width="220" height="26" rx="12" fill="#ea4335" opacity="0.9"/>
  <text x="350" y="326" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">SmartBFT Cluster (4 nodes)</text>

