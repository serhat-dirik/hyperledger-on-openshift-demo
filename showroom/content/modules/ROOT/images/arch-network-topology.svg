  <rect x="25" y="390" width="90" height="48" rx="5" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <text x="70" y="412" text-anchor="middle" font-weight="600" font-size="13" fill="#1565c0">Peer 0</text>
  <text x="70" y="430" text-anchor="middle" font-size="11" fill="#666">Endorser</text>

  <rect x="125" y="390" width="90" height="48" rx="5" fill="#fff" stroke="#ea4335" stroke-width="1"/>
  <text x="170" y="412" text-anchor="middle" font-weight="600" font-size="13" fill="#ea4335">Orderer 1</text>
  <text x="170" y="430" text-anchor="middle" font-size="11" fill="#666">SmartBFT</text>

  <rect x="25" y="448" width="90" height="48" rx="5" fill="#fff" stroke="#fbbc04" stroke-width="1"/>
  <text x="70" y="470" text-anchor="middle" font-weight="600" font-size="13" fill="#f29900">admin-api</text>
  <text x="70" y="488" text-anchor="middle" font-size="11" fill="#666">Quarkus</text>

