<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 820" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">CertChain — Network Topology</text>

  <!-- ===== Central Namespace ===== -->
  <rect x="10" y="45" width="680" height="250" rx="12" fill="#e8f0fe" stroke="#4285f4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="25" y="72" font-size="17" font-weight="bold" fill="#1a73e8">certchain (Central)</text>

  <!-- Row 1: Core infrastructure -->
  <rect x="25" y="85" width="145" height="55" rx="6" fill="#fff" stroke="#34a853" stroke-width="1.5"/>
  <text x="97" y="108" text-anchor="middle" font-weight="600" font-size="14" fill="#34a853">Fabric CA</text>
  <text x="97" y="128" text-anchor="middle" font-size="12" fill="#666">TLS + MSP certs</text>

  <rect x="185" y="85" width="145" height="55" rx="6" fill="#fff" stroke="#ea4335" stroke-width="1.5"/>
  <text x="257" y="108" text-anchor="middle" font-weight="600" font-size="14" fill="#ea4335">Orderer 0</text>
  <text x="257" y="128" text-anchor="middle" font-size="12" fill="#666">SmartBFT</text>

  <rect x="345" y="85" width="145" height="55" rx="6" fill="#fff" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="417" y="108" text-anchor="middle" font-weight="600" font-size="14" fill="#f29900">verify-api</text>
  <text x="417" y="128" text-anchor="middle" font-size="12" fill="#666">Quarkus</text>

  <rect x="505" y="85" width="170" height="55" rx="6" fill="#fff" stroke="#fbbc04" stroke-width="1.5"/>
  <text x="590" y="108" text-anchor="middle" font-weight="600" font-size="14" fill="#f29900">cert-portal</text>
  <text x="590" y="128" text-anchor="middle" font-size="12" fill="#666">React + Vite</text>

  <!-- Row 2: Supporting services -->
  <rect x="25" y="155" width="145" height="55" rx="6" fill="#fff" stroke="#9c27b0" stroke-width="1.5"/>
  <text x="97" y="178" text-anchor="middle" font-weight="600" font-size="14" fill="#9c27b0">Keycloak</text>
  <text x="97" y="198" text-anchor="middle" font-size="12" fill="#666">Central IdP</text>

  <rect x="185" y="155" width="145" height="55" rx="6" fill="#fff" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="257" y="178" text-anchor="middle" font-weight="600" font-size="14" fill="#0d47a1">Postgres</text>
  <text x="257" y="198" text-anchor="middle" font-size="12" fill="#666">KC store</text>

  <rect x="345" y="155" width="145" height="55" rx="6" fill="#fff" stroke="#ff6d00" stroke-width="1.5"/>
  <text x="417" y="178" text-anchor="middle" font-weight="600" font-size="14" fill="#ff6d00">Grafana</text>
  <text x="417" y="198" text-anchor="middle" font-size="12" fill="#666">3 dashboards</text>

  <rect x="505" y="155" width="170" height="55" rx="6" fill="#fff" stroke="#00897b" stroke-width="1.5"/>
  <text x="590" y="178" text-anchor="middle" font-weight="600" font-size="14" fill="#00897b">certcontract</text>
  <text x="590" y="198" text-anchor="middle" font-size="12" fill="#666">Go chaincode (CcaaS)</text>

  <!-- Jobs row -->
