  <rect x="125" y="506" width="90" height="28" rx="5" fill="#fff" stroke="#0d47a1" stroke-width="1"/>
  <text x="170" y="525" text-anchor="middle" font-weight="600" font-size="12" fill="#0d47a1">CouchDB</text>

  <!-- DataForge -->
  <rect x="240" y="348" width="220" height="195" rx="12" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="255" y="375" font-size="16" font-weight="bold" fill="#283593">certchain-dataforge</text>

  <rect x="255" y="390" width="90" height="48" rx="5" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <text x="300" y="412" text-anchor="middle" font-weight="600" font-size="13" fill="#1565c0">Peer 0</text>
  <text x="300" y="430" text-anchor="middle" font-size="11" fill="#666">Endorser</text>

  <rect x="355" y="390" width="90" height="48" rx="5" fill="#fff" stroke="#ea4335" stroke-width="1"/>
  <text x="400" y="412" text-anchor="middle" font-weight="600" font-size="13" fill="#ea4335">Orderer 2</text>
  <text x="400" y="430" text-anchor="middle" font-size="11" fill="#666">SmartBFT</text>

  <rect x="255" y="448" width="90" height="48" rx="5" fill="#fff" stroke="#fbbc04" stroke-width="1"/>
  <text x="300" y="470" text-anchor="middle" font-weight="600" font-size="13" fill="#f29900">admin-api</text>
  <text x="300" y="488" text-anchor="middle" font-size="11" fill="#666">Quarkus</text>

  <rect x="355" y="448" width="90" height="48" rx="5" fill="#fff" stroke="#fbbc04" stroke-width="1"/>
  <text x="400" y="470" text-anchor="middle" font-weight="600" font-size="13" fill="#f29900">course-mgr</text>
  <text x="400" y="488" text-anchor="middle" font-size="11" fill="#666">React</text>

  <rect x="255" y="506" width="90" height="28" rx="5" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
  <text x="300" y="525" text-anchor="middle" font-weight="600" font-size="12" fill="#9c27b0">Keycloak</text>

  <rect x="355" y="506" width="90" height="28" rx="5" fill="#fff" stroke="#0d47a1" stroke-width="1"/>
  <text x="400" y="525" text-anchor="middle" font-weight="600" font-size="12" fill="#0d47a1">CouchDB</text>

  <!-- NeuralPath -->
  <rect x="470" y="348" width="220" height="195" rx="12" fill="#e0f2f1" stroke="#009688" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="485" y="375" font-size="16" font-weight="bold" fill="#00695c">certchain-neuralpath</text>

  <rect x="485" y="390" width="90" height="48" rx="5" fill="#fff" stroke="#1565c0" stroke-width="1"/>
  <text x="530" y="412" text-anchor="middle" font-weight="600" font-size="13" fill="#1565c0">Peer 0</text>
  <text x="530" y="430" text-anchor="middle" font-size="11" fill="#666">Endorser</text>

  <rect x="585" y="390" width="90" height="48" rx="5" fill="#fff" stroke="#ea4335" stroke-width="1"/>
  <text x="630" y="412" text-anchor="middle" font-weight="600" font-size="13" fill="#ea4335">Orderer 3</text>
  <text x="630" y="430" text-anchor="middle" font-size="11" fill="#666">SmartBFT</text>

  <rect x="485" y="448" width="90" height="48" rx="5" fill="#fff" stroke="#fbbc04" stroke-width="1"/>
  <text x="530" y="470" text-anchor="middle" font-weight="600" font-size="13" fill="#f29900">admin-api</text>
  <text x="530" y="488" text-anchor="middle" font-size="11" fill="#666">Quarkus</text>

  <rect x="585" y="448" width="90" height="48" rx="5" fill="#fff" stroke="#fbbc04" stroke-width="1"/>
  <text x="630" y="470" text-anchor="middle" font-weight="600" font-size="13" fill="#f29900">course-mgr</text>
  <text x="630" y="488" text-anchor="middle" font-size="11" fill="#666">React</text>

  <rect x="485" y="506" width="90" height="28" rx="5" fill="#fff" stroke="#9c27b0" stroke-width="1"/>
  <text x="530" y="525" text-anchor="middle" font-weight="600" font-size="12" fill="#9c27b0">Keycloak</text>

  <rect x="585" y="506" width="90" height="28" rx="5" fill="#fff" stroke="#0d47a1" stroke-width="1"/>
  <text x="630" y="525" text-anchor="middle" font-weight="600" font-size="12" fill="#0d47a1">CouchDB</text>

  <!-- Orderer cluster connections -->
  <line x1="257" y1="140" x2="170" y2="390" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="257" y1="140" x2="400" y2="390" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="257" y1="140" x2="630" y2="390" stroke="#ea4335" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ===== External users ===== -->
  <rect x="25" y="570" width="150" height="52" rx="25" fill="#1a73e8" filter="url(#shadow)"/>
  <text x="100" y="594" text-anchor="middle" font-weight="600" font-size="15" fill="#fff">Registrar</text>
  <text x="100" y="612" text-anchor="middle" font-size="11" fill="#ddd">Course Manager</text>

  <rect x="195" y="570" width="150" height="52" rx="25" fill="#34a853" filter="url(#shadow)"/>
  <text x="270" y="594" text-anchor="middle" font-weight="600" font-size="15" fill="#fff">Student</text>
  <text x="270" y="612" text-anchor="middle" font-size="11" fill="#ddd">Cert Portal</text>

  <rect x="365" y="570" width="150" height="52" rx="25" fill="#fbbc04" filter="url(#shadow)"/>
  <text x="440" y="594" text-anchor="middle" font-weight="600" font-size="15" fill="#fff">Employer</text>
  <text x="440" y="612" text-anchor="middle" font-size="11" fill="#ddd">Public Verify</text>

  <rect x="535" y="570" width="150" height="52" rx="25" fill="#9c27b0" filter="url(#shadow)"/>
  <text x="610" y="594" text-anchor="middle" font-weight="600" font-size="15" fill="#fff">Platform Admin</text>
  <text x="610" y="612" text-anchor="middle" font-size="11" fill="#ddd">ArgoCD + Grafana</text>

  <!-- User arrows -->
  <line x1="100" y1="570" x2="70" y2="496" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="570" x2="590" y2="140" stroke="#34a853" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="570" x2="417" y2="140" stroke="#fbbc04" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="570" x2="417" y2="210" stroke="#9c27b0" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <text x="350" y="660" text-anchor="middle" font-size="12" fill="#999">Each org namespace contains identical components. Orderers form a 4-node SmartBFT cluster across namespaces.</text>
  <text x="350" y="680" text-anchor="middle" font-size="12" fill="#999">Central namespace hosts shared infrastructure: Fabric CA, cert-portal, verify-api, Grafana, and central Keycloak.</text>
</svg>
