<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
