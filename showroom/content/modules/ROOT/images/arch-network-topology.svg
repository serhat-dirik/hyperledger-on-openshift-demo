  <!-- Footer -->
  <text x="480" y="560" text-anchor="middle" font-size="11" fill="#999">Each org namespace contains identical components. Orderers form a 4-node SmartBFT cluster across namespaces.</text>
  <text x="480" y="578" text-anchor="middle" font-size="11" fill="#999">Central namespace hosts shared infrastructure: Fabric CA, cert-portal, verify-api, Grafana, and central Keycloak.</text>
