  <text x="90" y="250" text-anchor="middle" font-weight="600" font-size="12" fill="#78909c">copy-secrets (w8)</text>

  <rect x="170" y="225" width="130" height="40" rx="6" fill="#fff" stroke="#78909c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="235" y="250" text-anchor="middle" font-weight="600" font-size="12" fill="#78909c">genesis (w9)</text>

  <rect x="315" y="225" width="140" height="40" rx="6" fill="#fff" stroke="#78909c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="385" y="250" text-anchor="middle" font-weight="600" font-size="12" fill="#78909c">channel-setup (w10)</text>

  <rect x="470" y="225" width="160" height="40" rx="6" fill="#fff" stroke="#78909c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="550" y="250" text-anchor="middle" font-weight="600" font-size="12" fill="#78909c">chaincode-lifecycle (w11)</text>

