# Test profile — overrides for unit tests without real infrastructure

# OIDC: keep extension active (needed for JsonWebToken CDI bean)
# Security is mocked via @TestSecurity / @OidcSecurity annotations
quarkus.oidc.auth-server-url=http://localhost:0/realms/test
quarkus.oidc.client-id=test
quarkus.oidc.application-type=service
quarkus.oidc.discovery-enabled=false
quarkus.oidc.jwks-path=/protocol/openid-connect/certs
quarkus.oidc.jwks.resolve-early=false

# Dummy Fabric Gateway config — FabricGatewayClient is mocked, so these are never used
certchain.fabric.channel=test-channel
certchain.fabric.chaincode=certcontract
certchain.fabric.peer-endpoint=localhost:7051
certchain.fabric.msp-id=TestMSP
certchain.fabric.cert-path=/tmp/dummy-cert.pem
certchain.fabric.key-path=/tmp/dummy-key.pem
certchain.fabric.tls-cert-path=/tmp/dummy-tls.crt
