# CertChain Admin API — Quarkus configuration
# Environment-specific values injected via ConfigMap / env vars at runtime.

# --- HTTP ---
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

# --- Keycloak OIDC ---
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:certchain}
quarkus.oidc.client-id=cert-admin-api
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:change-me}
quarkus.oidc.tls.verification=none

# --- Fabric Gateway ---
certchain.fabric.channel=${FABRIC_CHANNEL_NAME:certchannel}
certchain.fabric.chaincode=certcontract
certchain.fabric.peer-endpoint=${FABRIC_PEER_ENDPOINT:peer0-techpulse:7051}
certchain.fabric.msp-id=${FABRIC_MSP_ID:TechPulseMSP}
certchain.fabric.cert-path=${FABRIC_CERT_PATH:/etc/fabric/certs/cert.pem}
certchain.fabric.key-path=${FABRIC_KEY_PATH:/etc/fabric/certs/key.pem}
certchain.fabric.tls-cert-path=${FABRIC_TLS_CERT_PATH:/etc/fabric/tls/ca.crt}

# --- Swagger UI + OpenAPI ---
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=CertChain Admin API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=REST API for training institute administrators to issue and manage blockchain-anchored certificates.

# --- Health + Management endpoints (permit unauthenticated access) ---
quarkus.http.auth.permission.openapi.paths=/q/*
quarkus.http.auth.permission.openapi.policy=permit
quarkus.health.openapi.included=true
