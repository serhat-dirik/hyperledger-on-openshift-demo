quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/

# Keycloak — central KC for transcript endpoints
quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:certchain}
quarkus.oidc.client-id=verify-api
quarkus.oidc.tls.verification=none

# Public verification (no auth required)
quarkus.http.auth.permission.public-verify.paths=/api/v1/verify/*
quarkus.http.auth.permission.public-verify.policy=permit

# Student transcript (requires authentication via central KC)
quarkus.http.auth.permission.transcript.paths=/api/v1/transcript/*
quarkus.http.auth.permission.transcript.policy=authenticated

# Health endpoints
quarkus.http.auth.permission.health.paths=/q/*
quarkus.http.auth.permission.health.policy=permit

# Fabric Gateway
certchain.fabric.channel=${FABRIC_CHANNEL_NAME:certchannel}
certchain.fabric.chaincode=certcontract
certchain.fabric.peer-endpoint=${FABRIC_PEER_ENDPOINT:peer0-techpulse:7051}
certchain.fabric.msp-id=${FABRIC_MSP_ID:TechPulseMSP}
certchain.fabric.cert-path=${FABRIC_CERT_PATH:/etc/fabric/certs/cert.pem}
certchain.fabric.key-path=${FABRIC_KEY_PATH:/etc/fabric/certs/key.pem}
certchain.fabric.tls-cert-path=${FABRIC_TLS_CERT_PATH:/etc/fabric/tls/ca.crt}

# Verification URL template (for QR code generation)
certchain.verify.base-url=${VERIFY_BASE_URL:https://cert-portal-certchain.apps.example.com}

# --- Swagger UI + OpenAPI ---
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=CertChain Verification API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Public certificate verification and authenticated student transcript API for the CertChain blockchain credentialing platform.
