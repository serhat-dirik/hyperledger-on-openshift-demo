# Test profile — disable real OIDC and Fabric connections

# OIDC: use test security (no real Keycloak needed)
quarkus.oidc.auth-server-url=http://localhost:0/fake-oidc
quarkus.oidc.enabled=false

# Keep the same auth permission structure so route-level security is tested
quarkus.http.auth.permission.public-verify.paths=/api/v1/verify/*
quarkus.http.auth.permission.public-verify.policy=permit
quarkus.http.auth.permission.transcript.paths=/api/v1/transcript/*
quarkus.http.auth.permission.transcript.policy=authenticated
quarkus.http.auth.permission.health.paths=/q/*
quarkus.http.auth.permission.health.policy=permit

# Dummy Fabric config (FabricGatewayClient is mocked, but config properties must resolve)
certchain.fabric.channel=test-channel
certchain.fabric.chaincode=certcontract
certchain.fabric.peer-endpoint=localhost:7051
certchain.fabric.msp-id=TestMSP
certchain.fabric.cert-path=/tmp/fake-cert.pem
certchain.fabric.key-path=/tmp/fake-key.pem
certchain.fabric.tls-cert-path=/tmp/fake-tls.crt

# Verification URL for QR code generation
certchain.verify.base-url=https://test.certchain.example.com
